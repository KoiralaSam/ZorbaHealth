version: "2"
sql:
  - engine: "postgresql"
    queries: "../internal/adapters/secondary/repositories/postgres/query"
    schema: "../migrations"
    gen:
      go:
        package: "sqlc"
        out: "../internal/adapters/secondary/repositories/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        emit_empty_slices: true
