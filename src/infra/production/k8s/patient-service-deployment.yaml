apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: europe-west1-docker.pkg.dev/{{PROJECT_ID}}/zorba-health/patient-service
          ports:
            - containerPort: 50052
              name: grpc
          env:
            - name: GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  key: PATIENT_SERVICE_GRPC_ADDR
                  name: app-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  type: ClusterIP
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
  selector:
    app: patient-service
