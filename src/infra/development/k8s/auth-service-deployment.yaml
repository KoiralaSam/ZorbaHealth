apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: zorba-health/auth-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: grpc
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: AUTH_SERVICE_HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  key: AUTH_SERVICE_HTTP_ADDR
                  name: app-config
            - name: AUTH_SERVICE_GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  key: AUTH_SERVICE_GRPC_ADDR
                  name: app-config
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: app-secrets
            - name: AUTH_SERVICE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: AUTH_SERVICE_JWT_SECRET
                  name: app-secrets
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: rabbitmq-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 9092
      name: grpc
  selector:
    app: auth-service
