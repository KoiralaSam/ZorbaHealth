apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: zorba-health/notification-service
          ports:
            - containerPort: 50056
              name: grpc
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          env:
            - name: NOTIFICATION_SERVICE_GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  key: NOTIFICATION_SERVICE_GRPC_ADDR
                  name: app-config
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: rabbitmq-credentials
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  key: apiKey
                  name: sendgrid-credentials
            - name: SENDGRID_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  key: SENDGRID_FROM_EMAIL
                  name: app-config
            - name: SENDGRID_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  key: SENDGRID_FROM_NAME
                  name: app-config
            - name: PUBLIC_WEB_BASE_URL
              valueFrom:
                configMapKeyRef:
                  key: PUBLIC_WEB_BASE_URL
                  name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP
  ports:
    - port: 50056
      targetPort: 50056
      name: grpc
  selector:
    app: notification-service
