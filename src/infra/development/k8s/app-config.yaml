apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  ENVIRONMENT: "development"
  # API Gateway
  API_GATEWAY_HTTP_ADDR: ":8081"
  # Patient Service
  PATIENT_SERVICE_HTTP_ADDR: ":8083"
  PATIENT_SERVICE_GRPC_ADDR: "patient-service:9093"
  # Auth Service
  AUTH_SERVICE_HTTP_ADDR: ":8082"
  AUTH_SERVICE_GRPC_ADDR: "auth-service:9092"
  # Agent Worker Service
  AGENT_WORKER_HTTP_ADDR: ":8090"
  LIVEKIT_WS_URL: "ws://34.198.147.82:7880"
  # RAG Service
  RAG_SERVICE_GRPC_ADDR: "rag-service:50053"
  # Medical Records Service
  MEDICAL_RECORDS_SERVICE_GRPC_ADDR: "health-records-service:50054"
  HEALTH_RECORDS_SERVICE_GRPC_ADDR: "health-records-service:50054"
  # Analytics Service
  ANALYTICS_SERVICE_GRPC_ADDR: "analytics-service:50054"
  # Notification Service
  NOTIFICATION_SERVICE_GRPC_ADDR: "notification-service:50056"
  # Translation Service
  TRANSLATION_SERVICE_GRPC_ADDR: "translation-service:50057"
  TRANSLATION_MODEL_BASE_URL: "http://translation-model:8080"
  # Location Service
  LOCATION_SERVICE_HTTP_ADDR: ":8090"
  LOCATION_SERVICE_GRPC_ADDR: "location-service:50051"
  LOCATION_REDIS_DB: "0"
  LOCATION_REDIS_KEY_PREFIX: "location:session:"
  LOCATION_REDIS_SESSION_TTL_SEC: "0"
  IP_GEOLOCATION_TIMEOUT_SEC: "5"
  # OTP HTTP server (SMS via VoIP.ms) — credentials in voipms-credentials secret
  HTTP_ADDR: ":3000"
  VOIPMS_DID: "3185162690"
  # Public web base URL used to generate verification links in emails
  PUBLIC_WEB_BASE_URL: "http://localhost:3000"

  # PostgreSQL (host/port/db name only; credentials in app-secrets)
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "healthai"
  POSTGRES_DB: "healthai"
  # Redis
  REDIS_ADDR: "redis:6379"
