# Copy this file to secrets.yaml and replace placeholder values.
# secrets.yaml is gitignored — never commit real secrets.
#
#   cp secrets.example.yaml secrets.yaml
#   # Edit secrets.yaml with your values, then run Tilt / kubectl apply
#
# Use the same POSTGRES_PASSWORD in postgres-secret and in app-secrets DATABASE_URL.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: "healthai"
  POSTGRES_PASSWORD: "REPLACE_POSTGRES_PASSWORD"
  POSTGRES_DB: "healthai"

---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
type: Opaque
stringData:
  username: "guest"
  password: "guest"
  uri: "amqp://guest:guest@rabbitmq:5672/"

---
apiVersion: v1
kind: Secret
metadata:
  name: sendgrid-credentials
type: Opaque
stringData:
  apiKey: "REPLACE_WITH_SENDGRID_API_KEY"
  fromEmail: "zorbahealth@samarpankoirala.tech"
  fromName: "ZorbaHealth"

---
apiVersion: v1
kind: Secret
metadata:
  name: voipms-credentials
type: Opaque
stringData:
  # Used by notification-service for inbound SMS webhooks + outbound SMS (VoIP.ms REST API).
  # These keys are referenced by infra/development/k8s/notification-service-deployment.yaml.
  username: "REPLACE_VOIPMS_USERNAME"
  password: "REPLACE_VOIPMS_PASSWORD"
  did: "REPLACE_VOIPMS_DID_E164_OR_NANP"
  key: "REPLACE_VOIPMS_API_KEY"
  voipms_baseurl: "https://voip.ms/api/v1/rest.php"
  # HTTP listen addr for notification-service webhook server (matches containerPort in dev k8s).
  http_addr: ":3001"

---
apiVersion: v1
kind: Secret
metadata:
  name: elevenlabs-credentials
type: Opaque
stringData:
  apiKey: "REPLACE_WITH_ELEVENLABS_API_KEY"
  voiceId: "REPLACE_WITH_ELEVENLABS_VOICE_ID"

---
apiVersion: v1
kind: Secret
metadata:
  name: deepgram-credentials
type: Opaque
stringData:
  apiKey: "REPLACE_WITH_DEEPGRAM_API_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
type: Opaque
stringData:
  apiKey: "REPLACE_WITH_OPENAI_API_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: livekit-credentials
type: Opaque
stringData:
  apiKey: "REPLACE_WITH_LIVEKIT_API_KEY"
  apiSecret: "REPLACE_WITH_LIVEKIT_API_SECRET"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgres://healthai:REPLACE_POSTGRES_PASSWORD@postgres:5432/healthai?sslmode=disable"
  AUTH_SERVICE_JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET"
  PATIENT_SERVICE_JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET"
  INTERNAL_SERVICE_SECRET: "REPLACE_WITH_INTERNAL_SERVICE_SECRET"
  REDIS_PASSWORD: ""
  # Must include one "%s" placeholder for caller IP
  IP_GEOLOCATION_ENDPOINT_TEMPLATE: "https://REPLACE_GEO_PROVIDER_ENDPOINT/%s"
